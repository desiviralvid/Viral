<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Stream</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{
background:#0d0d0d;
color:white;
background-image:
radial-gradient(circle at top,#222,#111 60%);
}

header{
padding:20px 40px;
font-size:28px;
font-weight:bold;
color:#ff2d55;
letter-spacing:2px;
}

.container{
width:95%;
max-width:1400px;
margin:auto;
padding-bottom:40px;
}

.player-box{
background:#181818;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,.5);
}

video{
width:100%;
background:black;
display:block;
}

.controls{
display:flex;
align-items:center;
gap:12px;
padding:15px;
background:#1b1b1b;
}

.controls button{
background:#2d2d2d;
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
font-size:16px;
transition:.25s;
}

.controls button:hover{
background:#ff2d55;
}

.controls input[type=range]{
cursor:pointer;
}

#progress{
flex:1;
}

#volume{
width:120px;
}

.title{
padding:20px;
font-size:26px;
font-weight:bold;
}

.section-title{
font-size:24px;
margin:35px 0 20px;
}

.suggestions{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.card{
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:.3s;
border:1px solid #2a2a2a;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 15px 35px rgba(255,45,85,.35);
}

.card video{
height:150px;
object-fit:cover;
pointer-events:none;
}

.card h3{
padding:15px;
font-size:17px;
}

footer{
text-align:center;
padding:30px;
color:#777;
}

</style>

</head>
<body>

<header>
PREMIUM STREAM
</header>

<div class="container">

<div class="player-box">

<video id="player">
<source src="vid-01.mp4" type="video/mp4">
</video>

<div class="controls">

<button onclick="backward()">⏪ 5s</button>

<button onclick="togglePlay()" id="playBtn">▶</button>

<button onclick="forward()">5s ⏩</button>

<input type="range" id="progress" value="0">

<input type="range" id="volume"
min="0"
max="1"
step="0.01"
value="1">

<button onclick="fullscreen()">⛶</button>

</div>

</div>

<div class="title" id="videoTitle">
Now Playing : Video 01
</div>

<div class="section-title">
Recommended Videos
</div>

<div class="suggestions">

<div class="card" onclick="loadVideo('vid-02.mp4','Video 02')">
<video muted>
<source src="vid-02.mp4">
</video>
<h3>Video 02</h3>
</div>

<div class="card" onclick="loadVideo('vid-03.mp4','Video 03')">
<video muted>
<source src="vid-03.mp4">
</video>
<h3>Video 03</h3>
</div>

<div class="card" onclick="loadVideo('vid-04.mp4','Video 04')">
<video muted>
<source src="vid-04.mp4">
</video>
<h3>Video 04</h3>
</div>

<div class="card" onclick="loadVideo('vid-05.mp4','Video 05')">
<video muted>
<source src="vid-05.mp4">
</video>
<h3>Video 05</h3>
</div>

<div class="card" onclick="loadVideo('vid-06.mp4','Video 06')">
<video muted>
<source src="vid-06.mp4">
</video>
<h3>Video 06</h3>
</div>

</div>

</div>

<footer>
Premium Video Streaming UI
</footer>

<script>

const player=document.getElementById("player");
const progress=document.getElementById("progress");
const volume=document.getElementById("volume");
const playBtn=document.getElementById("playBtn");
const title=document.getElementById("videoTitle");

function togglePlay(){

if(player.paused){
player.play();
playBtn.innerHTML="⏸";
}
else{
player.pause();
playBtn.innerHTML="▶";
}

}

player.onplay=()=>{
playBtn.innerHTML="⏸";
}

player.onpause=()=>{
playBtn.innerHTML="▶";
}

function backward(){
player.currentTime-=5;
}

function forward(){
player.currentTime+=5;
}

player.addEventListener("timeupdate",()=>{

progress.value=(player.currentTime/player.duration)*100;

});

progress.addEventListener("input",()=>{

player.currentTime=(progress.value/100)*player.duration;

});

volume.addEventListener("input",()=>{

player.volume=volume.value;

});

function fullscreen(){

if(player.requestFullscreen){
player.requestFullscreen();
}

}

function loadVideo(file,name){

player.src=file;

title.innerHTML="Now Playing : "+name;

player.play();

window.scrollTo({
top:0,
behavior:"smooth"
});

}

</script>

</body>
</html>
